# Active when SPRING_PROFILES_ACTIVE=beta (Render free tier)

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER:gradeops}
    password: ${DATABASE_PASSWORD:}

firebase:
  credentials-json: ${FIREBASE_ADMIN_CREDENTIALS:}

r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET:gradeops-beta}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
