spring:
  application:
    name: grade-ops-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gradeops}
    username: ${DATABASE_USER:gradeops}
    password: ${DATABASE_PASSWORD:gradeops}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  internal:
    secret: ${INTERNAL_API_SECRET:change-me-in-production}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://gradeops.app}
  auth:
    reset-code-retention-days: 90

gradeops:
  web:
    base-url: ${GRADEOPS_WEB_BASE_URL:http://localhost:3000}
  email:
    from-address: ${GRADEOPS_MAIL_FROM:noreply@gradeops.app}
    from-name: ${GRADEOPS_MAIL_FROM_NAME:GradeOps AI}
    support-email: ${GRADEOPS_SUPPORT_EMAIL:soporte@gradeops.app}
    reset-password:
      ttl-minutes: 30
      subject: "Restablece tu contraseña en GradeOps AI"
