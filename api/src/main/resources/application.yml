spring:
  application:
    name: grade-ops-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gradeops}
    username: ${DATABASE_USER:gradeops}
    password: ${DATABASE_PASSWORD:gradeops}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false

app:
  internal:
    secret: ${INTERNAL_API_SECRET:change-me-in-production}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://gradeops.app}
