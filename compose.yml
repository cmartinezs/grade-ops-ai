services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gradeops
      POSTGRES_USER: gradeops
      POSTGRES_PASSWORD: gradeops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradeops -d gradeops"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (Spring Boot) ──────────────────────────────────────────────────────
  api:
    build: ./api
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/gradeops
      DATABASE_USER: gradeops
      DATABASE_PASSWORD: gradeops
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-secret-change-me}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin-key.json
    volumes:
      - ${FIREBASE_ADMIN_CREDENTIALS_PATH:?Set FIREBASE_ADMIN_CREDENTIALS_PATH in .env}:/run/secrets/firebase-admin-key.json:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Web (Next.js) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:?Set NEXT_PUBLIC_FIREBASE_API_KEY in .env}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:?Set NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN in .env}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:?Set NEXT_PUBLIC_FIREBASE_PROJECT_ID in .env}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:?Set NEXT_PUBLIC_FIREBASE_APP_ID in .env}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:?Set NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID in .env}
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
