<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .lbl { font: var(--weight-bold) var(--text-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 10px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, StatCard, RubricLevel } = window.GradeOpsAIDesignSystem_fcd12b;
  const { useState } = React;
  const I = (d) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;

  function Demo() {
    const [tab, setTab] = useState('all');
    return (
      <div>
        <div className="stats">
          <StatCard label="Promedio del curso" value="5,4" icon={I(<path d="M3 3v18h18M7 14l3-3 3 3 5-6"/>)} delta="+0,3" />
          <StatCard label="Por corregir" value="14" iconTone="gold" icon={I(<path d="M12 6v6l4 2M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>)} />
          <StatCard label="En riesgo" value="3" unit="alumnos" iconTone="danger" icon={I(<path d="M12 9v4m0 4h.01M10.3 4.3L2.6 18a2 2 0 001.7 3h15.4a2 2 0 001.7-3L13.7 4.3a2 2 0 00-3.4 0z"/>)} delta="-1" deltaDir="down" />
        </div>

        <p className="lbl">Tabs — underline</p>
        <div className="row" style={{marginBottom:'20px'}}>
          <Tabs value={tab} onChange={setTab} tabs={[
            {id:'all', label:'Todas', count:24},
            {id:'open', label:'Abiertas', count:8},
            {id:'closed', label:'Cerradas', count:14},
            {id:'mixed', label:'Mixtas', count:2},
          ]} />
        </div>

        <p className="lbl">Tabs — pills</p>
        <div className="row" style={{marginBottom:'20px'}}>
          <Tabs value="personal" onChange={()=>{}} variant="pills" tabs={[
            {id:'personal', label:'Banco personal'},
            {id:'global', label:'Banco global'},
          ]} />
        </div>

        <p className="lbl">Rubric performance ladder</p>
        <div className="row">
          <RubricLevel level="exceeds" />
          <RubricLevel level="meets" />
          <RubricLevel level="developing" />
          <RubricLevel level="beginning" />
          <RubricLevel level="notmet" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
