<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .lbl { font: var(--weight-bold) var(--text-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 8px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 20px; }
  .panel { position: relative; width: 220px; height: 86px; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); background: var(--surface-card); display: flex; align-items: center; justify-content: center; color: var(--text-subtle); font-size: 13px; }
  .col { flex: 1; min-width: 240px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Spinner, LoadingOverlay, ProgressBar, Toast, ConfirmDialog } = window.GradeOpsAIDesignSystem_fcd12b;
  const { useState } = React;

  function Demo() {
    const [confirm, setConfirm] = useState(false);
    const [loading, setLoading] = useState(false);
    return (
      <div>
        <div className="row" style={{alignItems:'flex-start'}}>
          <div className="col">
            <p className="lbl">In-place loaders</p>
            <div className="row">
              <Spinner size="sm" /><Spinner size="md" /><Spinner size="lg" />
              <div className="panel"><LoadingOverlay label="Corrigiendo con IA…" />Tabla de resultados</div>
            </div>
          </div>
          <div className="col">
            <p className="lbl">Progress</p>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <ProgressBar value={18} max={32} label="Corrigiendo con IA" showValue striped />
              <ProgressBar value={84} tone="success" label="Cobertura del curso" showValue />
            </div>
          </div>
        </div>

        <p className="lbl">Toasts</p>
        <div className="row">
          <div style={{position:'relative',transform:'none'}}>
            <Toast tone="success" title="Evaluación guardada" message="Prueba Unidad 3 · Biología" onClose={()=>{}} />
          </div>
          <Toast loading title="Subiendo archivos…" message="2 de 5 informes" onClose={()=>{}} />
          <Toast tone="error" title="No se pudo corregir" message="Reintenta en unos segundos" onClose={()=>{}} />
        </div>

        <p className="lbl">Confirm before change</p>
        <div className="row">
          <Button variant="danger" onClick={()=>setConfirm(true)}>Eliminar evaluación</Button>
        </div>

        <ConfirmDialog
          open={confirm} tone="danger"
          title="¿Eliminar evaluación?"
          message="Se eliminarán 32 entregas y sus correcciones. Esta acción no se puede deshacer."
          confirmLabel="Eliminar" loading={loading}
          onCancel={()=>setConfirm(false)}
          onConfirm={()=>{ setLoading(true); setTimeout(()=>{ setLoading(false); setConfirm(false); }, 1400); }}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
