<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; max-width: 640px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Field, Input, Textarea, Select, Checkbox, Radio, Switch } = window.GradeOpsAIDesignSystem_fcd12b;
  const Search = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>;

  function Demo() {
    return (
      <div className="grid">
        <Field label="Nombre de la evaluación" htmlFor="a" required hint="Visible para los estudiantes">
          <Input id="a" placeholder="Ej. Prueba Unidad 3" />
        </Field>
        <Field label="Buscar en el banco" htmlFor="b">
          <Input id="b" icon={<Search/>} placeholder="Fotosíntesis…" />
        </Field>
        <Field label="Asignatura" htmlFor="c">
          <Select id="c" defaultValue="bio">
            <option value="bio">Biología</option>
            <option value="mat">Matemática</option>
            <option value="len">Lenguaje</option>
          </Select>
        </Field>
        <Field label="Código de acceso" htmlFor="d" hint="Magic link del estudiante">
          <Input id="d" mono defaultValue="GOPS-7K2A-9F" readOnly />
        </Field>
        <Field label="Enunciado" htmlFor="e" required>
          <Textarea id="e" placeholder="Escribe el enunciado…" defaultValue="Explica el proceso de fotosíntesis." />
        </Field>
        <div className="stack">
          <Field label="Tipo de pregunta cerrada"><div className="stack" style={{gap:'8px'}}>
            <Radio name="qt" label="Alternativa única" defaultChecked />
            <Radio name="qt" label="Alternativa múltiple" />
            <Radio name="qt" label="Verdadero / Falso" />
          </div></Field>
          <Checkbox label="Clave: alternativa C" defaultChecked />
          <Switch label="Permitir entregas atrasadas" defaultChecked />
          <Switch label="Compartir globalmente" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
