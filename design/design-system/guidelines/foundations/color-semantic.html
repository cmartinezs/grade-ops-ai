<!-- @dsCard group="Colors" viewport="700x160" name="Semantic — Status" subtitle="Success, warning, danger, info — surface + text pairs" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:18px; background:var(--surface-card); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .chip { border-radius:var(--radius-md); padding:12px 14px; border:1px solid; }
  .chip b { font-family:var(--font-display); font-size:14px; display:block; }
  .chip span { font-family:var(--font-mono); font-size:10.5px; opacity:.8; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; }
</style></head>
<body>
  <div class="grid">
    <div class="chip" style="background:var(--success-50);border-color:var(--success-500);color:var(--success-700)"><b><span class="dot" style="background:var(--success-500)"></span>Success</b><span>--success-500 / 700</span></div>
    <div class="chip" style="background: var(--warning-50); border-color: rgb(232, 222, 12); color: var(--warning-700); background-color: rgb(255, 255, 232)"><b><span class="dot" style="background:var(--warning-500)"></span>Warning</b><span>--warning-500 / 700</span></div>
    <div class="chip" style="background:var(--danger-50);border-color:var(--danger-500);color:var(--danger-700)"><b><span class="dot" style="background:var(--danger-500)"></span>Danger</b><span>--danger-500 / 700</span></div>
    <div class="chip" style="background:var(--info-50);border-color:var(--info-500);color:var(--info-700)"><b><span class="dot" style="background:var(--info-500)"></span>Info</b><span>--info-500 / 700</span></div>
  </div>
</body></html>
