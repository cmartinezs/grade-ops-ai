<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Sprout (primary)" subtitle="Teal-green: learning, growth, primary actions" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:18px; background:var(--surface-card); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:84px; display:flex; align-items:flex-end; padding:7px; }
  .sw span { font-family:var(--font-mono); font-size:10px; font-weight:600; }
  .meta { display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:var(--text-muted); }
  .meta b { color:var(--text-strong); font-family:var(--font-display); }
</style></head>
<body>
  <div class="scale" id="s"></div>
  <div class="meta"><b>Sprout</b><span>--brand · --brand-hover · --sprout-50…900</span></div>
  <script>
    const steps=[['50','#ECFDF5','#0B4A38'],['100','#D2F8E5','#0B4A38'],['200','#A6F0CE','#0B4A38'],['300','#6FE2B4','#0B4A38'],['400','#34CB95','#0B4A38'],['500','#12B07A','#fff'],['600','#0B9268','#fff'],['700','#0A7554','#fff'],['800','#0C5E45','#fff'],['900','#0B4A38','#fff']];
    document.getElementById('s').innerHTML=steps.map(([k,c,t])=>`<div class="sw" style="background:${c};color:${t}"><span>${k}<br>${c}</span></div>`).join('');
  </script>
</body></html>
