<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation — Shadows" subtitle="Soft, warm-tinted, low-spread" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:28px 22px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; gap:24px; }
  .item { text-align:center; }
  .box { width:96px; height:64px; background:var(--surface-card); border-radius:var(--radius-lg); }
  .k { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:12px; display:block; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="k">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="k">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="k">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="k">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="k">xl</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-brand);background:var(--brand)"></div><span class="k">brand</span></div>
  </div>
</body></html>
