<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / Shadows" subtitle="Soft, warm-tinted, low-spread" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:26px 22px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; gap:22px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:92px; height:64px; background:var(--surface-card); border-radius:var(--radius-lg); }
  .col b { font-family:var(--font-mono); font-size:11px; color:var(--text-strong); }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><b>xs</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><b>sm</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><b>md</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><b>lg</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><b>xl</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-brand)"></div><b>brand</b></div>
  </div>
</body></html>
