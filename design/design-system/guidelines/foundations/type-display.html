<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Headings & display: characterful, structured" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .d { font-family:var(--font-display); color:var(--text-strong); letter-spacing:var(--tracking-tight); line-height:1.05; margin:0 0 4px; }
  .h1 { font-size:46px; font-weight:700; }
  .h2 { font-size:28px; font-weight:600; }
  .h3 { font-size:22px; font-weight:600; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); }
</style></head>
<body>
  <p class="d h1">Corrige con IA, enseña con tiempo</p>
  <p class="tag">46px / 700 · --text-4xl</p>
  <p class="d h2" style="margin-top:16px">Evaluaciones abiertas, cerradas y mixtas</p>
  <p class="tag">28px / 600 · --text-2xl</p>
  <p class="d h3" style="margin-top:14px">Banco de preguntas · Rúbricas automáticas</p>
  <p class="tag">22px / 600 · --text-xl</p>
</body></html>
