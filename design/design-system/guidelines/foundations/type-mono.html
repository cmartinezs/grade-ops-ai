<!-- @dsCard group="Type" viewport="700x150" name="Mono — JetBrains Mono & Eyebrow" subtitle="Codes, magic-link tokens, IDs, overlines" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .mono { font-family:var(--font-mono); font-size:17px; color:var(--text-strong); letter-spacing:0.03em; }
  .eyebrow { font-family:var(--font-sans); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); margin-top:4px; }
  .pill { display:inline-block; font-family:var(--font-mono); background:var(--surface-sunken); border:1px solid var(--border-subtle); border-radius:6px; padding:6px 10px; font-size:14px; color:var(--text-body); }
</style></head>
<body>
  <p class="eyebrow">Resultados del estudiante</p>
  <p class="tag" style="margin-bottom:16px">Eyebrow · 12px / 700 · uppercase · 0.08em</p>
  <span class="pill">GOPS-7K2A-9F · magic link</span>
  <p class="tag">Mono · JetBrains Mono · --font-mono</p>
</body></html>
