<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Minor-third ramp · 11 → 60px" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:20px 22px; background:var(--surface-card); font-family:var(--font-sans); }
  .r { display:flex; align-items:baseline; gap:16px; padding:3px 0; }
  .r .s { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); width:120px; flex:none; }
  .r .t { color:var(--text-strong); font-family:var(--font-display); font-weight:600; line-height:1.1; white-space:nowrap; }
</style></head>
<body>
  <div class="r"><span class="s">5xl · 60</span><span class="t" style="font-size:60px">Aa</span></div>
  <div class="r"><span class="s">3xl · 36</span><span class="t" style="font-size:36px">Evaluaciones</span></div>
  <div class="r"><span class="s">2xl · 28</span><span class="t" style="font-size:28px">Banco de preguntas</span></div>
  <div class="r"><span class="s">xl · 22</span><span class="t" style="font-size:22px">Rúbricas automáticas</span></div>
  <div class="r"><span class="s">lg · 18</span><span class="t" style="font-size:18px">Título de tarjeta</span></div>
  <div class="r"><span class="s">md · 15 (base)</span><span class="t" style="font-size:15px;font-family:var(--font-sans);font-weight:400;color:var(--text-body)">Texto base de la interfaz y lectura</span></div>
  <div class="r"><span class="s">xs · 12</span><span class="t" style="font-size:12px;font-family:var(--font-sans);font-weight:600;color:var(--text-muted)">Etiquetas y metadatos</span></div>
</body></html>
